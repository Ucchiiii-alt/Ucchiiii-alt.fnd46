  <h1 class="title"> フォトギャラリー</h1>
     <p class="honbun">これはフォトギャラリーです<br>(写真が好きなので自分でギャラリーを作成したかったため。<br>写真は自身で撮影したものですので著作権は問題ありません)<br>このページの作成を通じて以下の確認をしています</p>
     <li class="honbun">
      ・HTMLでのページ作成方法、テキスト、画像の配置<br>
      ・JavaScriptを用いて、イベントの処理、入力情報の受け渡し、HTMLの書き換え<br>
      ・CSSの記載方法の確認<br>
     </li>
  

  <div class="bl_imgSwitcher" id="js_imgSwitcher">

   <input class="input_imgSwitcher" id="thumbNo" type="number">
